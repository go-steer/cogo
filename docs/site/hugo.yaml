# Hugo configuration for the Cogo documentation site.
#
# Theme is the Hextra Hugo module — pulled in via go.mod. Build with:
#
#   cd docs/site
#   hugo server   # local preview at http://localhost:1313/cogo/
#   hugo          # production build into ./public
#
# Deployed to https://go-steer.github.io/cogo/ via .github/workflows/docs.yml.

baseURL: "https://go-steer.github.io/cogo/"
title: "Cogo"
languageCode: "en-us"

enableRobotsTXT: true
enableGitInfo: true
enableEmoji: true

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    style: github-dark

services:
  googleAnalytics:
    ID: ""

menu:
  main:
    - name: Documentation
      pageRef: /docs
      weight: 1
    - name: GitHub
      url: https://github.com/go-steer/cogo
      weight: 99
      params:
        icon: github

  sidebar:
    - identifier: more
      name: More
      params:
        type: separator
      weight: 1
    - name: "Releases ↗"
      url: "https://github.com/go-steer/cogo/releases"
      weight: 2
    - name: "Issues ↗"
      url: "https://github.com/go-steer/cogo/issues"
      weight: 3

params:
  description: "A terminal-native agentic CLI for Go developers — Claude Code in Go, MCP-native, project-scoped."

  navbar:
    displayTitle: true
    displayLogo: false

  theme:
    default: system
    displayToggle: true

  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: false

  page:
    width: normal

  toc:
    displayTags: true

  editURL:
    enable: true
    base: "https://github.com/go-steer/cogo/edit/main/docs/site/content"

  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content
      tokenize: forward
