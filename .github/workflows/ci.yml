name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same branch
# so we don't queue stale tests.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: '1.26'

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Module cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ env.GO_VERSION }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ env.GO_VERSION }}-

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        # Vertex e2e tests are gated on COGO_E2E=1 + auth env vars, so
        # they naturally skip in CI — no GCP secrets needed.
        # -race catches data races; coverprofile feeds the summary
        # below; covermode=atomic is required when -race is on.
        run: |
          go test -race -timeout 5m \
            -coverprofile=coverage.out -covermode=atomic \
            ./...

      - name: Coverage summary
        # Per-package + total. Per-line summary lands in the job log
        # so review can see what's exercised without leaving the page.
        run: |
          echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.out | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        # The HTML report is downloadable from the workflow-run page so
        # reviewers can drill into uncovered lines.
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 14
          if-no-files-found: error

  tidy:
    name: go mod tidy is clean
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - name: Tidy
        run: go mod tidy
      - name: Verify no diff
        run: |
          if ! git diff --quiet; then
            echo "::error::go.mod / go.sum is not tidy. Run 'go mod tidy' locally and commit the result."
            git diff
            exit 1
          fi
