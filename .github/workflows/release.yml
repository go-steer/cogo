name: release

on:
  push:
    tags:
      - 'v*.*.*'
  # Manual trigger so we can build a snapshot release for testing
  # without cutting a real tag. The job picks --snapshot in that path.
  workflow_dispatch:

permissions:
  # Needed by goreleaser to publish the release + assets.
  contents: write
  # Needed to push images to ghcr.io.
  packages: write

env:
  GO_VERSION: '1.26'

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history is required for goreleaser's changelog step.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Set up QEMU
        # arm64 image builds on amd64 runners need QEMU emulation.
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: >-
            release --clean
            ${{ github.event_name == 'workflow_dispatch' && '--snapshot' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Repo PAT with write access to go-steer/homebrew-cogo.
          # Create as a fine-grained PAT and add to the cogo repo as a
          # secret named HOMEBREW_TAP_GITHUB_TOKEN.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
